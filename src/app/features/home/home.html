<div class="home-container">
  <!-- Welcome Card -->
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title>Welcome to Your Dashboard</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>Hello, <strong>{{ username$ | async }}</strong>!</p>
      <p>Track your daily water intake and stay hydrated throughout the day.</p>
    </mat-card-content>
  </mat-card>

  <!-- Water Tracking Section -->
  <div class="water-tracking-section">
    <!-- Daily Display (Top) -->
    <app-water-display></app-water-display>
    
    <!-- Quick Add (Bottom) -->
    <app-water-intake></app-water-intake>
  </div>
</div>
