<div class="stats-content" *ngIf="vm$ | async as vm" data-cy="profile-stats">
  <ng-container *ngIf="vm.ready; else missingTpl">
    <div class="stats-grid">
      <mat-card class="stat-box" data-cy="stat-age">
        <mat-card-content>
          <div class="stat-label">Age</div>
          <div class="stat-value">{{ vm.age }} <span class="stat-unit">yrs</span></div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-box" data-cy="stat-bmi">
        <mat-card-content>
          <div class="stat-label">BMI</div>
          <div class="stat-value">{{ vm.bmi | number:'1.1-1' }}</div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-box" data-cy="stat-bfp">
        <mat-card-content>
          <div class="stat-label">Deurenberg BFP</div>
          <div class="stat-value">
            <ng-container *ngIf="vm.bfp !== null; else naTpl">
              {{ vm.bfp | number:'1.1-1' }} <span class="stat-unit">%</span>
            </ng-container>
            <ng-template #naTpl>
              <span class="na">N/A</span>
            </ng-template>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </ng-container>

  <ng-template #missingTpl>
    <div class="missing-card" data-cy="profile-stats-missing">
      <mat-icon>info</mat-icon>
      <span>Complete your {{ vm.missing.join(', ') }} to see profile stats.</span>
    </div>
  </ng-template>
</div>
