<mat-card class="water-intake-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon class="title-icon">opacity</mat-icon>
      Quick Add Water
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <!-- Quick Add Buttons -->
    <div class="quick-buttons">
      @for (quickBtn of quickAmounts; track quickBtn.value) {
        <button 
          mat-raised-button 
          color="primary"
          class="quick-add-btn"
          (click)="addQuickAmount(quickBtn.value)"
          [matTooltip]="'Add ' + quickBtn.label">
          <mat-icon>{{ quickBtn.icon }}</mat-icon>
          <span>{{ quickBtn.label }}</span>
        </button>
      }
    </div>

    <!-- Custom Amount Section -->
    <div class="custom-section">
      @if (!showCustomInput) {
        <button 
          mat-stroked-button 
          color="accent"
          class="custom-toggle-btn"
          (click)="toggleCustomInput()">
          <mat-icon>add_circle_outline</mat-icon>
          Custom Amount
        </button>
      }

      @if (showCustomInput) {
        <div class="custom-input-container">
          <mat-form-field appearance="outline" class="custom-input">
            <mat-label>Custom Amount (ml)</mat-label>
            <input 
              matInput 
              type="number"
              [(ngModel)]="customAmount"
              placeholder="Enter amount"
              min="0"
              max="5000"
              (keyup.enter)="addCustomAmount()">
            <span matTextSuffix>ml</span>
          </mat-form-field>
          
          <button 
            mat-raised-button 
            color="accent"
            [disabled]="customAmount <= 0"
            (click)="addCustomAmount()">
            <mat-icon>add</mat-icon>
            Add
          </button>
          
          <button 
            mat-icon-button
            (click)="toggleCustomInput()"
            matTooltip="Cancel">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      }
    </div>

    <!-- Undo Button -->
    <div class="actions">
      <button 
        mat-button 
        color="warn"
        (click)="undoLast()"
        matTooltip="Remove last entry">
        <mat-icon>undo</mat-icon>
        Undo Last
      </button>
    </div>
  </mat-card-content>
</mat-card>
